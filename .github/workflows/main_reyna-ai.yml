# Azure Web App Deploy — FastAPI backend in /backend subfolder
# Docs: https://github.com/Azure/webapps-deploy

name: Build and deploy Python app to Azure Web App - reyna-ai

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    # All steps run inside the backend/ folder so pip and gunicorn find the right files
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

      # Upload only the backend/ folder; Azure Oryx rebuilds deps on the server
      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            ./backend
            !./backend/antenv/
            !./backend/.venv/
            !./backend/__pycache__/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_6D01EE6AE3194407B2DF56E7CD5E950D }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_E63AE69078BB48AF925771640CA41FE9 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_DBF29D67C5024E9E8FE6CFB609FF655A }}

      # Push all 14 env vars from GitHub Secrets → Azure App Settings
      # Each secret must also exist under Settings > Secrets in your repo
      - name: Sync environment variables to Azure App Settings
        uses: azure/appservice-settings@v1
        with:
          app-name: 'reyna-ai'
          app-settings-json: |
            [
              { "name": "APP_NAME",                       "value": "Reyna AI Backend" },
              { "name": "DEBUG",                          "value": "false" },
              { "name": "SECRET_KEY",                     "value": "${{ secrets.SECRET_KEY }}" },
              { "name": "ALGORITHM",                      "value": "HS256" },
              { "name": "ACCESS_TOKEN_EXPIRE_MINUTES",    "value": "1440" },
              { "name": "MONGODB_URL",                    "value": "${{ secrets.MONGODB_URL }}" },
              { "name": "MONGODB_DB_NAME",                "value": "reyna_ai" },
              { "name": "NIM_API_KEY",                    "value": "${{ secrets.NIM_API_KEY }}" },
              { "name": "NIM_ENDPOINT",                   "value": "https://integrate.api.nvidia.com/v1" },
              { "name": "NIM_MODEL",                      "value": "meta/llama3-8b-instruct" },
              { "name": "OPENAI_API_KEY",                 "value": "${{ secrets.OPENAI_API_KEY }}" },
              { "name": "OULAD_DATA_DIR",                 "value": "app/ml" },
              { "name": "ENGAGEMENT_MATRIX_PATH",         "value": "app/ml/engagement_matrix.csv" },
              { "name": "SCM_DO_BUILD_DURING_DEPLOYMENT", "value": "true" },
              { "name": "STARTUP_COMMAND",
                "value": "gunicorn -w 4 -k uvicorn.workers.UvicornWorker app.main:app" }
            ]

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'reyna-ai'
          slot-name: 'Production'
          startup-command: 'gunicorn -w 4 -k uvicorn.workers.UvicornWorker app.main:app'